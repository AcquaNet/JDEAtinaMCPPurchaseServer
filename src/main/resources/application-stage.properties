# Perfil STAGE: apunta a los servicios de staging. Todas las URLs y credenciales
# son obligatorias por variable de entorno (sin fallback a localhost): si falta
# alguna, el arranque falla explicitamente en vez de conectarse a un host incorrecto.

# OAuth2 Resource Server (Keycloak de staging)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JDE_KEYCLOAK_ISSUER_URI}

# Mulesoft: backend de autenticacion + purchase orders + sales orders
jde.api.base-url=${JDE_MULESOFT_BASE_URL}
jde.so.api.base-url=${JDE_MULESOFT_BASE_URL}

# Gateway de Atina (operaciones BSSV genericas, POST /v1/operations/execute)
jde.atina.gateway.base-url=${JDE_ATINA_GATEWAY_BASE_URL}

# Identity mapping DB (H2 embebido en archivo, propio de este ambiente)
spring.datasource.url=jdbc:h2:file:./data/identity-mapping-stage;MODE=PostgreSQL;AUTO_SERVER=TRUE

# OpenBao (vault de credenciales JDE) - sin fallback, obligatorio en este ambiente
jde.vault.addr=${BAO_ADDR}
jde.vault.token=${BAO_TOKEN}

logging.level.com.atina.jdeMCPServer=INFO
