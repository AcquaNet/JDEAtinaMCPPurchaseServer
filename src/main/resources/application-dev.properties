# Perfil DEV: servicios corriendo en localhost (Mulesoft, Gateway de Atina, Keycloak,
# OpenBao). Es el perfil activo por defecto (ver spring.profiles.active en
# application.properties), pensado para ./mvnw spring-boot:run sin configuracion extra.

# OAuth2 Resource Server (Keycloak)
# Spring resuelve el jwk-set-uri via /realms/jde-integration/.well-known/openid-configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/jde-integration

# Mulesoft: backend de autenticacion + purchase orders + sales orders
jde.api.base-url=http://localhost:8089/api
jde.so.api.base-url=http://localhost:8089/api

# Gateway de Atina (operaciones BSSV genericas, POST /v1/operations/execute)
jde.atina.gateway.base-url=http://localhost:8086

# Identity mapping DB (H2 embebido en archivo). Mismo path que se usaba antes de
# separar por perfiles, para no perder la base de datos de desarrollo existente.
spring.datasource.url=jdbc:h2:file:./data/identity-mapping;MODE=PostgreSQL;AUTO_SERVER=TRUE

# OpenBao (vault de credenciales JDE) - localhost como fallback comodo para dev
jde.vault.addr=${BAO_ADDR:http://localhost:8200}
jde.vault.token=${BAO_TOKEN:}

# Logging mas verboso en desarrollo
logging.level.com.atina.jdeMCPServer=DEBUG
