server.port=8080
spring.application.name=JDEmcpPur
mcp.ai.mcp.server.name=JDEMCPPur
mcp.ai.mcp.server.version=1.0.0

# MCP Server Configuration
spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
spring.ai.mcp.server.stdio=false
spring.ai.mcp.server.type=sync  

# OAuth2 Resource Server (Keycloak)
# Spring resuelve el jwk-set-uri via /realms/jde-integration/.well-known/openid-configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/jde-integration
# Audiencia esperada en el token: debe coincidir con el claim "aud" que emite el
# mapper de audiencia del client (hoy: el propio clientId atina-mcp-server)
jde.mcp.security.expected-audience=atina-mcp-server
# Rol de realm requerido para aprobar/rechazar ordenes de compra
# (realm_access.roles del token de Keycloak)
jde.mcp.security.approver-role=purchase-order-approve

jde.api.base-url=http://localhost:8089/api
jde.api.login-timeout-minutes=10

# Sales Order API Configuration
jde.so.api.base-url=http://localhost:8089/api

# Gateway de Atina: operaciones BSSV genéricas (POST /v1/operations/execute).
# Lo usan los tools de sales order de consulta de cliente (lookupAddressBook) y
# detalle de cliente (getCustomerV3). El token de sesión JDE viaja como
# "Authorization: Bearer <token>".
jde.atina.gateway.base-url=http://localhost:8086
# Timeout (en minutos) para las respuestas del Gateway de Atina. El Gateway puede
# tardar bastante en resolver operaciones BSSV, asi que este valor puede subirse
# sin tocar codigo.
jde.atina.gateway.timeout-minutes=10
# Valor de la cabecera "TransactionId" que se envia en cada operacion del Gateway
jde.atina.gateway.transaction-id=12345

# Purchase order approval: operaciones BSSV del Gateway de Atina (JP430000.ProcurementManager).
# Defaults usados por jde_list_pending_purchase_orders cuando el caller no informa
# los parametros opcionales orderTypeCode / businessUnitCode / statusCodeNext, y por
# jde_get_purchase_order_detail para el statusCodeNext de getPurchaseOrderDetailForApprover.
jde.purchase.default-order-type-code=OP
jde.purchase.default-business-unit-code=30
jde.purchase.default-status-code-next=230
# Fijo (no es parametro del tool): status de aprobacion consultado en jde_list_pending_purchase_orders
jde.purchase.default-status-approval=2N
# Processing version del programa P43081 (approve/reject) enviada a processPurchaseOrderApproveReject
jde.purchase.p43081-version=ZJDE0001
# Nombre del claim en el token de sesion JDE (Atina) que trae el address book number
# (entityId) del aprobador logueado; usado como approver.entityId / approverAddressNumber
# en las operaciones BSSV de aprobacion de purchase orders.
jde.atina.address-book-claim=addressBookNumber
# TTL (en minutos) del cache en memoria de purchase orders pendientes (equivalente al
# Object Store de Mulesoft) que puebla jde_list_pending_purchase_orders y consumen
# jde_approve_purchase_order / jde_reject_purchase_order. Pasado este tiempo sin
# aprobar/rechazar, la orden se purga y hay que volver a listarla.
jde.purchase.pending-order-ttl-minutes=45
# Frecuencia (en minutos) del barrido que purga del cache las ordenes vencidas aunque
# nadie las vuelva a pedir. Debe ser menor al TTL para que la purga sea oportuna.
jde.purchase.pending-order-cleanup-interval-minutes=10

# Defaults para el tool jde_get_item_price cuando el caller no informa estos valores opcionales
jde.pricing.default-unit-of-measure=EA
jde.pricing.default-processing-version=ZJDE0001

# Identity mapping DB (H2 embebido en archivo, migraciones Flyway)
# AUTO_SERVER=TRUE permite conectarse con un cliente H2 externo (para inserts manuales)
# mientras el server corre
spring.datasource.url=jdbc:h2:file:./data/identity-mapping;MODE=PostgreSQL;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=

# Identity Bridge
# Implementacion activa de IdentityResolver: native (tabla identity_mapping) | federated (LDAP, futuro)
jde.identity.resolver=native

# OpenBao (vault de credenciales JDE) - nunca hardcodear el token
jde.vault.addr=${BAO_ADDR:http://localhost:8200}
jde.vault.token=${BAO_TOKEN:}

# Tokens del microservicio de Atina (HS256) aceptados como alternativa a Keycloak.
# El secreto es el mismo con el que firma el microservicio; el issuer es el claim
# "iss" que traen esos tokens. ATINA_JWT_SECRET viaja en Base64 estandar (no
# URL-safe, no texto plano) -- el microservicio la decodifica con
# DatatypeConverter.parseBase64Binary -- y este server replica ese mismo decode
# antes de usarla como clave HMAC. Sin ATINA_JWT_SECRET configurado, los tokens
# de Atina se rechazan (Keycloak sigue funcionando normal).
jde.atina.jwt.secret=${ATINA_JWT_SECRET:}
# Opt-in: si se setea, exige que el token de Atina traiga ese valor en "aud".
# Vacio (default) = no se exige, porque hoy el microservicio no emite ese claim.
# Activar solo despues de coordinar con Atina para que empiece a incluirlo.
jde.atina.jwt.expected-audience=
jde.atina.jwt.issuer=Issue
# Nombre del claim en el JWT de Keycloak que trae el token de sesion JDE emitido
# por Atina. Cuando el usuario se autentica con Keycloak y su token incluye este
# claim, su valor se usa directamente como X-Approver-Token (sin Identity Bridge
# ni vault). Vacio o ausente el claim = se sigue con el flujo del Identity Bridge.
jde.atina.token-claim=atina_token
# Fuente del token de sesion JDE de Atina cuando el usuario entra por Keycloak.
# Hace convivir la etapa 1 (claim del JWT) y la etapa 2 (OpenBao). Valores:
#   claim            -> solo el claim "atina_token" del JWT (etapa 1, default)
#   vault            -> solo el token guardado en OpenBao secret/data/jde/atina/{sub} (etapa 2)
#   claim-then-vault -> primero el claim; si no esta, OpenBao
#   vault-then-claim -> primero OpenBao; si no esta (o el vault falla), el claim
jde.atina.session-source=claim

# Tiempo maximo en milisegundos para que un conector espere a que se complete una solicitud.
server.tomcat.connection-timeout=600000
# Tiempo maximo en milisegundos que el servidor espere a que se lea la entrada del cliente.
server.tomcat.keep-alive-timeout=600000
