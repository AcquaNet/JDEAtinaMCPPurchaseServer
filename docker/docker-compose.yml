
services:
  keycloak-db:
    image: postgres:16
    container_name: keycloak-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-changeme_db_password}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - jde-auth-net

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-changeme_db_password}
      KEYCLOAK_ADMIN: ${KC_ADMIN_USER:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-changeme_admin_password}
      # En produccion (Azure VM), reemplazar start-dev por start
      # y setear KC_HOSTNAME al dominio/IP real + KC_PROXY=edge si hay reverse proxy
    ports:
      - "8180:8080"
    depends_on:
      - keycloak-db
    networks:
      - jde-auth-net

  openbao:
    image: openbao/openbao:2.5.0
    container_name: openbao
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    environment:
      # Modo dev: mismo criterio que start-dev en Keycloak.
      # Migrar a modo server (file/raft storage) junto con el pase a la VM de Azure.
      BAO_DEV_ROOT_TOKEN_ID: "${OPENBAO_ROOT_TOKEN:-dev-only-root-token}"
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      BAO_ADDR: "http://0.0.0.0:8200"
    command: ["server", "-dev"]
    volumes:
      - openbao_data:/openbao/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health?standbyok=true"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  jde-auth-net:
    driver: bridge

volumes:
  keycloak_db_data: 
  openbao_data:
